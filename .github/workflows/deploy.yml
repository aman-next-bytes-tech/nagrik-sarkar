name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Frontend Image
        run: |
          docker build \
          -t ghcr.io/aman-next-bytes-tech/nagrik-sarkar-frontend:latest \
          ./frontend

      - name: Push Frontend Image
        run: |
          docker push ghcr.io/aman-next-bytes-tech/nagrik-sarkar-frontend:latest

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd /opt/social-welfare/nagrik_sarkar

            docker login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ secrets.GHCR_TOKEN }}

            docker pull ghcr.io/aman-next-bytes-tech/nagrik-sarkar-frontend:latest

            docker compose -p socialwelfare up -d frontend

            docker image prune -af
