version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: social-welfare-backend
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: social-welfare-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
